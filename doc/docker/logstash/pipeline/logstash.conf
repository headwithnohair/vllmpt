input {
  # TCP 输入（应用日志通过 TCP 发送）
  tcp {
    port => 5044
    codec => json_lines
  }

  # Beats 输入（可选，用于 Filebeat）
  beats {
    port => 5045
  }
}

filter {
  # 解析应用日志
  if [fields][service] == "vllmpt" {
    # 添加时间戳
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }

    # 解析日志级别
    mutate {
      convert => {
        "level" => "string"
      }
    }

    # 添加标签
    mutate {
      add_tag => ["application_log"]
    }
  }

  # 解析 AI 调用日志
  if [fields][type] == "ai_call" {
    mutate {
      add_tag => ["ai_call_log"]
    }
  }
}

output {
  # 输出到 Elasticsearch
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "vllmpt-logs-%{+YYYY.MM.dd}"
  }

  # 控制台输出（调试用）
  stdout {
    codec => rubydebug
  }
}
